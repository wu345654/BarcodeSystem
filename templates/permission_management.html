{% extends "base.html" %}

{% block title %}权限管理 - 订单条码管理系统{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2 class="card-title">🔒 权限管理</h2>
        <button id="addPermissionBtn" class="btn btn-primary">
            <span>➕</span>
            <span>添加权限</span>
        </button>
    </div>
    <div class="card-body">
        <div id="permissionList">
            <div class="loading">加载中...</div>
        </div>
    </div>
</div>

<!-- 添加/编辑权限模态框 -->
<div id="permissionModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">添加权限</h3>
            <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <form id="permissionForm">
                <input type="hidden" id="permissionId">
                <div class="form-group">
                    <label class="form-label" for="permissionName">权限名称</label>
                    <input type="text" class="form-control" id="permissionName" name="name" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="permissionCode">权限代码</label>
                    <input type="text" class="form-control" id="permissionCode" name="code" required>
                    <small class="form-text text-muted">权限代码格式：模块.操作，例如：order.view</small>
                </div>
                <div class="form-group">
                    <label class="form-label" for="permissionDescription">描述</label>
                    <textarea class="form-control" id="permissionDescription" name="description" rows="3"></textarea>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" id="cancelBtn">取消</button>
            <button class="btn btn-primary" id="saveBtn">保存</button>
        </div>
    </div>
</div>

<script>
// 加载权限列表
async function loadPermissionList() {
    try {
        const response = await fetch('/api/permissions');
        const result = await response.json();
        
        if (result.success) {
            const permissions = result.data;
            const permissionList = document.getElementById('permissionList');
            
            if (permissions.length === 0) {
                permissionList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔒</div>
                        <p>暂无权限数据</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>权限名称</th>
                            <th>权限代码</th>
                            <th>描述</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            for (const permission of permissions) {
                html += `
                    <tr>
                        <td>${permission.id}</td>
                        <td>${permission.name}</td>
                        <td style="font-family: monospace;">${permission.code}</td>
                        <td>${permission.description || '-'}</td>
                        <td>${permission.created_at}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="editPermission(${permission.id})">编辑</button>
                            <button class="btn btn-sm btn-danger" onclick="deletePermission(${permission.id}, '${permission.name}')">删除</button>
                        </td>
                    </tr>
                `;
            }
            
            html += '</tbody></table>';
            permissionList.innerHTML = html;
        }
    } catch (error) {
        console.error('加载权限列表失败:', error);
        showAlert('加载权限列表失败', 'danger');
    }
}

// 打开添加权限模态框
function openAddPermissionModal() {
    document.getElementById('modalTitle').textContent = '添加权限';
    document.getElementById('permissionId').value = '';
    document.getElementById('permissionName').value = '';
    document.getElementById('permissionCode').value = '';
    document.getElementById('permissionDescription').value = '';
    
    document.getElementById('permissionModal').classList.add('active');
}

// 打开编辑权限模态框
async function editPermission(permissionId) {
    try {
        const response = await fetch(`/api/permissions/${permissionId}`);
        const result = await response.json();
        
        if (result.success) {
            const permission = result.data;
            document.getElementById('modalTitle').textContent = '编辑权限';
            document.getElementById('permissionId').value = permission.id;
            document.getElementById('permissionName').value = permission.name;
            document.getElementById('permissionCode').value = permission.code;
            document.getElementById('permissionDescription').value = permission.description || '';
            
            document.getElementById('permissionModal').classList.add('active');
        }
    } catch (error) {
        console.error('获取权限详情失败:', error);
        showAlert('获取权限详情失败', 'danger');
    }
}

// 保存权限
async function savePermission() {
    const permissionId = document.getElementById('permissionId').value;
    const name = document.getElementById('permissionName').value;
    const code = document.getElementById('permissionCode').value;
    const description = document.getElementById('permissionDescription').value;
    
    if (!name || !code) {
        showAlert('权限名称和代码为必填项', 'warning');
        return;
    }
    
    try {
        const url = permissionId ? `/api/permissions/${permissionId}` : '/api/permissions';
        const method = permissionId ? 'PUT' : 'POST';
        
        const data = {
            name,
            code,
            description
        };
        
        const response = await fetch(url, {
            method,
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        if (result.success) {
            showAlert(result.message, 'success');
            document.getElementById('permissionModal').classList.remove('active');
            loadPermissionList();
        } else {
            showAlert(result.message, 'danger');
        }
    } catch (error) {
        console.error('保存权限失败:', error);
        showAlert('保存权限失败', 'danger');
    }
}

// 删除权限
async function deletePermission(permissionId, permissionName) {
    if (!confirm(`确定要删除权限 "${permissionName}" 吗？`)) {
        return;
    }
    
    try {
        const response = await fetch(`/api/permissions/${permissionId}`, {
            method: 'DELETE'
        });
        
        const result = await response.json();
        if (result.success) {
            showAlert(result.message, 'success');
            loadPermissionList();
        } else {
            showAlert(result.message, 'danger');
        }
    } catch (error) {
        console.error('删除权限失败:', error);
        showAlert('删除权限失败', 'danger');
    }
}

// 关闭模态框
function closeModal() {
    document.getElementById('permissionModal').classList.remove('active');
}

// 页面加载时执行
document.addEventListener('DOMContentLoaded', () => {
    loadPermissionList();
    
    // 绑定事件
    document.getElementById('addPermissionBtn').addEventListener('click', openAddPermissionModal);
    document.getElementById('saveBtn').addEventListener('click', savePermission);
    document.getElementById('cancelBtn').addEventListener('click', closeModal);
    document.querySelector('.modal-close').addEventListener('click', closeModal);
    
    // 点击模态框外部关闭
    document.getElementById('permissionModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('permissionModal')) {
            closeModal();
        }
    });
});
</script>
{% endblock %}
