{% extends "base.html" %}

{% block title %}订单管理 - 订单条码管理系统{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2 class="card-title">📋 订单列表</h2>
        <button class="btn btn-success" onclick="openModal()">➕ 新建订单</button>
    </div>
    
    <div class="search-box">
        <input type="text" class="form-control" id="searchInput" placeholder="搜索工程名称、名称、产品、图号...">
        <button class="btn btn-primary" onclick="searchOrders()">🔍 搜索</button>
        <button class="btn btn-secondary" onclick="loadOrders()">🔄 重置</button>
    </div>
    
    <div id="ordersTable">
        <div class="empty-state">
            <div class="empty-state-icon">📦</div>
            <p>加载中...</p>
        </div>
    </div>
</div>

<!-- 新建/编辑订单模态框 -->
<div class="modal" id="orderModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">新建订单</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="orderForm">
                <input type="hidden" id="orderId">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">工程名称 <span style="color: red;">*</span></label>
                        <input type="text" class="form-control" id="workTag" placeholder="例如：泗泾不锈钢" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">名称 <span style="color: red;">*</span></label>
                        <input type="text" class="form-control" id="name" placeholder="例如：第1-2批" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">颜色</label>
                        <input type="text" class="form-control" id="color" placeholder="例如：香槟色">
                    </div>
                    <div class="form-group">
                        <label class="form-label">图号</label>
                        <input type="text" class="form-control" id="drawingNo" placeholder="例如：西#-院墙吊底-36">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">产品 <span style="color: red;">*</span></label>
                    <input type="text" class="form-control" id="product" placeholder="例如：西#-院墙吊底964+2861" required>
                </div>
                <div class="form-group">
                    <label class="form-label">数量 <span style="color: red;">*</span></label>
                    <input type="number" class="form-control" id="quantity" min="1" value="1" required>
                    <small style="color: #888;">将根据此数量生成对应数量的唯一条码</small>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">取消</button>
            <button class="btn btn-success" onclick="saveOrder()">保存</button>
        </div>
    </div>
</div>


{% endblock %}

{% block extra_js %}
<script>
let currentOrderId = null;
// 分页参数
let currentPage = 1;
const pageSize = 10;

// 加载订单列表
async function loadOrders(page = 1) {
    currentPage = page;
    try {
        document.getElementById('searchInput').value = '';
        const response = await fetch(`/api/orders?page=${page}&page_size=${pageSize}`);
        const result = await response.json();
        
        if (result.success) {
            renderOrders(result.data);
        }
    } catch (error) {
        console.error('加载订单失败:', error);
        showAlert('加载订单失败', 'danger');
    }
}

// 渲染订单列表
function renderOrders(orders) {
    const container = document.getElementById('ordersTable');
    
    if (orders.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">📦</div>
                <p>暂无订单数据</p>
                <button class="btn btn-primary" onclick="openModal()" style="margin-top: 15px;">创建第一个订单</button>
            </div>
        `;
        return;
    }
    
    let html = `
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>工程名称</th>
                    <th>名称</th>
                    <th>产品</th>
                    <th>颜色</th>
                    <th>图号</th>
                    <th>数量</th>
                    <th>扫描进度</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    orders.forEach(order => {
        const stats = order.scan_stats;
        const progress = stats.total > 0 ? (stats.scanned / stats.total * 100).toFixed(1) : 0;
        
        html += `
            <tr>
                <td>${order.id}</td>
                <td>${order.work_tag}</td>
                <td>${order.name}</td>
                <td>${order.product}</td>
                <td>${order.color || '-'}</td>
                <td>${order.drawing_no || '-'}</td>
                <td>${order.quantity}</td>
                <td>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span class="badge ${progress == 100 ? 'badge-success' : progress > 0 ? 'badge-warning' : 'badge-info'}">
                            ${stats.scanned}/${stats.total}
                        </span>
                        <div class="progress" style="width: 80px;">
                            <div class="progress-bar" style="width: ${progress}%"></div>
                        </div>
                    </div>
                </td>
                <td>${formatDate(order.created_at)}</td>
                <td>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn btn-sm btn-primary" onclick="viewBarcodes(${order.id})">条码</button>
                        <button class="btn btn-sm btn-secondary" onclick="editOrder(${order.id})">编辑</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteOrder(${order.id})">删除</button>
                    </div>
                </td>
            </tr>
        `;
    });
    
    html += '</tbody></table>';
    
    // 添加分页控件
    const hasMoreData = orders.length === pageSize;
    html += `
        <div style="margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px;">
            <button class="btn btn-sm btn-secondary" onclick="loadOrders(1)" ${currentPage === 1 ? 'disabled' : ''}>
                首页
            </button>
            <button class="btn btn-sm btn-secondary" onclick="loadOrders(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                上一页
            </button>
            <span style="font-size: 14px; color: #666;">
                第 ${currentPage} 页
            </span>
            <button class="btn btn-sm btn-secondary" onclick="loadOrders(${currentPage + 1})" ${!hasMoreData ? 'disabled' : ''}>
                下一页
            </button>
        </div>
    `;
    
    container.innerHTML = html;
}

// 搜索订单
async function searchOrders() {
    const keyword = document.getElementById('searchInput').value.trim();
    if (!keyword) {
        loadOrders();
        return;
    }
    
    try {
        const response = await fetch(`/api/orders/search?keyword=${encodeURIComponent(keyword)}`);
        const result = await response.json();
        
        if (result.success) {
            renderOrders(result.data);
        }
    } catch (error) {
        console.error('搜索订单失败:', error);
        showAlert('搜索失败', 'danger');
    }
}

// 打开模态框
function openModal(orderId = null) {
    currentOrderId = orderId;
    document.getElementById('orderForm').reset();
    
    if (orderId) {
        document.getElementById('modalTitle').textContent = '编辑订单';
        // 加载订单数据
        loadOrderForEdit(orderId);
    } else {
        document.getElementById('modalTitle').textContent = '新建订单';
        document.getElementById('orderId').value = '';
    }
    
    document.getElementById('orderModal').classList.add('active');
}

// 关闭模态框
function closeModal() {
    document.getElementById('orderModal').classList.remove('active');
    currentOrderId = null;
}

// 加载订单数据用于编辑
async function loadOrderForEdit(orderId) {
    try {
        const response = await fetch(`/api/orders/${orderId}`);
        const result = await response.json();
        
        if (result.success) {
            const order = result.data;
            document.getElementById('orderId').value = order.id;
            document.getElementById('workTag').value = order.work_tag;
            document.getElementById('name').value = order.name;
            document.getElementById('color').value = order.color || '';
            document.getElementById('drawingNo').value = order.drawing_no || '';
            document.getElementById('product').value = order.product;
            document.getElementById('quantity').value = order.quantity;
        }
    } catch (error) {
        console.error('加载订单数据失败:', error);
    }
}

// 保存订单
async function saveOrder() {
    const form = document.getElementById('orderForm');
    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }
    
    const orderData = {
        work_tag: document.getElementById('workTag').value,
        name: document.getElementById('name').value,
        color: document.getElementById('color').value,
        drawing_no: document.getElementById('drawingNo').value,
        product: document.getElementById('product').value,
        quantity: parseInt(document.getElementById('quantity').value)
    };
    
    try {
        let response;
        if (currentOrderId) {
            // 更新订单
            response = await fetch(`/api/orders/${currentOrderId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });
        } else {
            // 创建订单
            response = await fetch('/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });
        }
        
        const result = await response.json();
        
        if (result.success) {
            showAlert(currentOrderId ? '订单更新成功' : '订单创建成功');
            closeModal();
            loadOrders();
        } else {
            showAlert(result.message || '操作失败', 'danger');
        }
    } catch (error) {
        console.error('保存订单失败:', error);
        showAlert('保存失败', 'danger');
    }
}

// 编辑订单
function editOrder(orderId) {
    openModal(orderId);
}

// 删除订单
async function deleteOrder(orderId) {
    if (!confirmDelete('确定要删除此订单吗？相关的条码数据也将被删除。')) {
        return;
    }
    
    try {
        const response = await fetch(`/api/orders/${orderId}`, {
            method: 'DELETE'
        });
        
        const result = await response.json();
        
        if (result.success) {
            showAlert('订单删除成功');
            loadOrders();
        } else {
            showAlert(result.message || '删除失败', 'danger');
        }
    } catch (error) {
        console.error('删除订单失败:', error);
        showAlert('删除失败', 'danger');
    }
}

// 查看条码
function viewBarcodes(orderId) {
    // 跳转到条码页面
    window.location.href = `/barcodes/${orderId}`;
}



// 页面加载时执行
document.addEventListener('DOMContentLoaded', () => {
    loadOrders();
    
    // 搜索框回车事件
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            searchOrders();
        }
    });
});

// 点击模态框外部关闭
document.getElementById('orderModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) {
        closeModal();
    }
});

document.getElementById('barcodeModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) {
        closeBarcodeModal();
    }
});
</script>
{% endblock %}
