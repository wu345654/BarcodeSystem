name: Build Packages

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path "requirements.txt") { pip install -r requirements.txt }
    - name: Build Windows executable
      run: |
        Write-Host "Current directory: $pwd"
        Write-Host "Listing files:"
        Get-ChildItem -Force
        Write-Host "Running build script..."
        python build_windows.py
        Write-Host "After build - listing dist directory:"
        if (Test-Path "dist") {
          Get-ChildItem -Force "dist"
        } else {
          Write-Host "dist directory not found"
        }
        Write-Host "Listing dist/windows directory:"
        if (Test-Path "dist/windows") {
          Get-ChildItem -Force "dist/windows"
          Write-Host "Contents of dist/windows:"
          Get-ChildItem -Recurse -Force "dist/windows" | Where-Object { $_.PSIsContainer -eq $false } | Sort-Object FullName
        } else {
          Write-Host "dist/windows directory not found"
        }
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: dist/windows/

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Build Linux executable
      run: |
        python build_linux.py
    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: dist/linux/

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Build macOS executable
      run: |
        python build_macos.py
    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-build
        path: dist/macos/